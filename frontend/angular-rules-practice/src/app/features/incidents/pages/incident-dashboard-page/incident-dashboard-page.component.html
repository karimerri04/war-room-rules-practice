@if (vm$ | async; as vm) {
  <main class="dashboard-page">
    <header class="dashboard-header">
      <h1>War Room Incident Dashboard</h1>
      <p>Diagnose, investigate and resolve technical incidents with Angular.</p>
    </header>

    <app-incident-stats [stats]="vm.stats" (statClick)="onStatClick($event)" />

    <app-incident-filters
      [selectedStatus]="selectedStatus()"
      [selectedSeverity]="selectedSeverity()"
      (statusChange)="onStatusChange($event)"
      (severityChange)="onSeverityChange($event)"
    />

    <p class="dashboard-count">
      Showing {{ vm.filteredIncidents.length }} of {{ vm.incidents.length }} incidents.
    </p>

    <app-incident-list [incidents]="vm.filteredIncidents" />
  </main>
} @else {
  <p>Loading incidents...</p>
}
