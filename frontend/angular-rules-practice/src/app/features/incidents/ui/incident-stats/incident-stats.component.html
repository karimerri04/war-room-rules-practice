<section class="incident-stats" aria-label="Incident statistics">
  @for (item of items; track item.label) {
    <button type="button" class="incident-stat-card" (click)="onStatClick(item.filter)">
      <span class="incident-stat-label">{{ item.label }}</span>
      <span class="incident-stat-value">{{ item.value }}</span>
    </button>
  }
</section>
